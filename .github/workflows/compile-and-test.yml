name: Compile and test

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

defaults:
  run:
    shell: "bash"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false
  # Windows 强制使用 node-libcurl 预编译二进制，避免本地编译依赖
  npm_config_prefer_binary: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present
  compile:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ========== 1️⃣ Linux 纯图形运行库依赖安装（彻底移除系统级 curl 开发库阻断本地编译） ==========
      - name: Install Linux GUI runtime deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0t64 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            libgbm1

      # ========== 2️⃣ 降维打击：在安装阶段让 node-libcurl 直接锁定并拉取 Electron 二进制 ==========
      # 这样它在下载时就已经变成了 Electron 专属包，彻底免去后续的 @electron/rebuild 扫描
      - name: Install dependencies with Electron Native Flags
        run: npm ci
        env:
          # 告诉 node-pre-gyp 管理器：现在是为 Electron 环境拉取二进制包
          npm_config_runtime: electron
          # 关键：手动强行对齐你当前项目里使用的 Electron 主版本号
          npm_config_target: v41.0.3
          npm_config_disturl: https://www.electronjs.org/headers
          NODE_LIBCURL_BINARY_IS_STATIC: 1

      # ========== 3️⃣ 彻底放弃 @electron/rebuild，改用标准原生库的专用安全重构 ==========
      # 由于 node-libcurl 已经齐备，我们用纯标准的 npm rebuild 处理剩余的 better-sqlite3
      - name: Rebuild other standard native modules
        run: |
          npm rebuild better-sqlite3 --build-from-source
        # node-llama-cpp 和 @lancedb/lancedb 基于现代 NAPI 架构，在 Node 22/Electron 下本就免重构直接可用

      # 验证 electron 安装
      - name: Verify Electron installation
        run: npx electron --version
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      # 多包工作区版本同步
      - name: Sync App Version
        run: |
          npm version "${{inputs.app-version}}" --no-git-tag-version --workspaces --include-workspace-root

      - run: npm run compile
        env:
          VITE_DISTRIBUTION_CHANNEL: ${{inputs.distribution-channel}}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/root*, dist/latest*.yml"

      - name: Upload compiled app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{inputs.distribution-channel}}
          path: dist
