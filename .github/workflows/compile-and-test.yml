name: Compile and test

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

defaults:
  run:
    shell: "bash"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false
  # Windows 强制使用 node-libcurl 预编译二进制，避免本地编译依赖
  npm_config_prefer_binary: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present

  compile:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ========== 1️⃣ Linux 图形自检依赖 + 升级最新版 libcurl 解决 WebSocket 头文件缺失 ==========
      - name: Install Linux GUI runtime & Latest Libcurl
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0t64 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            libgbm1 \
            libcurl4-openssl-dev \
            curl

      # 执行依赖锁依赖安装
      - name: Install dependencies
        run: npm ci
        env:
          # 全平台：安装时直接拉取 node-libcurl 已经预编译好的生产包，阻止依赖泛滥
          NODE_LIBCURL_BINARY_IS_STATIC: 1

      # ========== 2️⃣ 在 Electron 重构时直接忽略 node-libcurl（因为它已无需重构） ==========
      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild -f -w better-sqlite3,node-llama-cpp,@lancedb/lancedb
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      # 验证 electron 安装
      - name: Verify Electron installation
        run: npx electron --version
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      # 多包工作区版本同步
      - name: Sync App Version
        run: |
          npm version "${{inputs.app-version}}" --no-git-tag-version --workspaces --include-workspace-root

      - run: npm run compile
        env:
          VITE_DISTRIBUTION_CHANNEL: ${{inputs.distribution-channel}}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/root*, dist/latest*.yml"

      - name: Upload compiled app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{inputs.distribution-channel}}
          path: dist