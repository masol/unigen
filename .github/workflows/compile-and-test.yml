name: Compile and test

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

defaults:
  run:
    shell: "bash"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false
  # Windows 强制使用 node-libcurl 预编译二进制，避免本地编译依赖
  npm_config_prefer_binary: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present

  compile:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ========== Linux 图形和自检底层依赖维持（移除已失效的本地 curl 编译库） ==========
      - name: Install Linux native build deps (libcurl)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0t64 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            libgbm1 \
            libcurl4-openssl-dev curl

      # 执行安装：通过环境变量强制让 node-libcurl 走官方预编译二进制，阻止本地 C++ 编译
      - name: Install dependencies
        run: npm ci
        env:
          # 核心：禁止本地 node-gyp 编译，全平台强制拉取 node-libcurl 预编译文件
          NODE_LIBCURL_BINARY_IS_STATIC: 1            

      # ========== 强制对齐 Monorepo 中的所有原生模块进行 Electron 重构 ==========
      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild -f -w node-libcurl,better-sqlite3,node-llama-cpp,@lancedb/lancedb
        env:
          ELECTRON_DISABLE_SANDBOX: 1
          # 核心：告诉 electron-rebuild 在处理 node-libcurl 时，直接去下对应的 Electron 预编译包，不要本地 build
          NODE_LIBCURL_BINARY_IS_STATIC: 1

      #验证 electron 安装，Linux 下禁用 sandbox（CI 无SUID 权限）
      - name: Verify Electron installation
        run: npx electron --version
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      # 多包工作区版本同步
      - name: Sync App Version
        run: |
          npm version "${{inputs.app-version}}" --no-git-tag-version --workspaces --include-workspace-root

      - run: npm run compile
        env:
          VITE_DISTRIBUTION_CHANNEL: ${{inputs.distribution-channel}}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/root*, dist/latest*.yml"

      - name: Upload compiled app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{inputs.distribution-channel}}
          path: dist