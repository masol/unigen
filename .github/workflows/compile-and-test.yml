name: Compile and test

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

defaults:
  run:
    shell: "bash"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false
  # Windows 强制使用 node-libcurl 预编译二进制，避免本地编译依赖
  npm_config_prefer_binary: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present

  compile:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ========== 新增1：Linux 提前安装 libcurl 开发库（解决 curl-config 缺失） ==========
      - name: Install Linux native build deps (libcurl)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            libgbm1 \
            libcurl4-openssl-dev curl

      # ========== 新增2：Windows 安装编译工具链（兜底，防止预编译失效） ==========
      - name: Install Windows build tools
        if: matrix.os == 'windows-latest'
        run: |
          npm config set msvs_version 2022

      # ========== 新增3：macOS 安装 curl 开发库 ==========
      - name: Install macOS libcurl
        if: matrix.os == 'macos-latest'
        run: brew install curl

      - run: npm ci

      # ========== 强制对齐 Monorepo 中的所有原生模块进行 Electron 重构 ==========
      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild -f -w node-libcurl,better-sqlite3,node-llama-cpp,@lancedb/lancedb
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      #验证 electron 安装，Linux 下禁用 sandbox（CI 无SUID 权限）
      - name: Verify Electron installation
        run: npx electron --version
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      - run: npm version "${{inputs.app-version}}" --no-git-tag-version
      - run: npm run compile
        env:
          VITE_DISTRIBUTION_CHANNEL: ${{inputs.distribution-channel}}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/root*, dist/latest*.yml"
      - name: Upload compiled app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{inputs.distribution-channel}}
          path: dist
