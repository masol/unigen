name: Compile and test

on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string
      distribution-channel:
        required: true
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_NO_WARNINGS: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  npm_config_audit: false
  npm_config_fund: false

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck --if-present

  compile:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Electron 运行依赖（Ubuntu）
      - name: Install Linux runtime dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0t64 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            libgbm1 \
            xauth

      # 安装所有依赖
      - name: Install dependencies
        run: npm ci

      # 重新编译 Electron Native Modules
      #
      # 会自动处理：
      #   - better-sqlite3（重编）
      #   - node-llama-cpp（自动判断）
      #   - @lancedb/lancedb（自动判断）
      #
      # 无需手动维护 npm rebuild xxx
      #
      - name: Rebuild Electron native modules
        run: npx electron-builder install-app-deps

      - name: Verify Electron installation
        run: npx electron --version
        env:
          ELECTRON_DISABLE_SANDBOX: 1

      - name: Sync App Version
        run: |
          npm version "${{ inputs.app-version }}" \
            --no-git-tag-version \
            --workspaces \
            --include-workspace-root

      - name: Compile
        run: npm run compile
        env:
          VITE_DISTRIBUTION_CHANNEL: ${{ inputs.distribution-channel }}

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/root*, dist/latest*.yml"

      - name: Upload compiled app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ inputs.distribution-channel }}
          path: dist
